# Authoritative manager-side compose file for the curated scenario stack.
# Used by ../scripts/rfqmgmt_scenario_stack.py.
services:
  postgres:
    image: postgres:16
    container_name: rfq_scenario_postgres
    environment:
      POSTGRES_USER: rfq_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: rfq_manager_scenario_db
    ports:
      - "15432:5432"
    volumes:
      - rfq_scenario_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfq_user -d rfq_manager_scenario_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  event_bus_mock:
    image: python:3.11-slim
    container_name: rfq_scenario_event_bus_mock
    working_dir: /app
    command: python mock_event_bus.py
    ports:
      - "18081:8081"
    volumes:
      - ./mock_event_bus.py:/app/mock_event_bus.py

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfq_scenario_api
    environment:
      DATABASE_URL: postgresql+psycopg2://rfq_user:changeme@postgres:5432/rfq_manager_scenario_db
      APP_ENV: development
      APP_PORT: 8000
      APP_DEBUG: "false"
      AUTH_BYPASS_ENABLED: "true"
      AUTH_BYPASS_TEAM: Estimation
      AUTH_BYPASS_USER_NAME: Scenario Seeder
      EVENT_BUS_URL: http://event_bus_mock:8081/events
      FILE_STORAGE_PATH: /app/uploads_scenario
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      event_bus_mock:
        condition: service_started
    command: >-
      sh -c "set -e;
      echo '[scenario-bootstrap] Applying database migrations...';
      alembic upgrade head;
      echo '[scenario-bootstrap] Starting API server...';
      exec uvicorn src.app:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./uploads_scenario:/app/uploads_scenario
      - ../seed_outputs:/app/seed_outputs

volumes:
  rfq_scenario_postgres_data:
