# Pre-commit hooks — run before every commit
# Install: pip install pre-commit && pre-commit install
# Full authoritative gate remains: python scripts/verify.py

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
