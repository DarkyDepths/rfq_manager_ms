services:
  postgres:
    image: postgres:16
    container_name: rfq_postgres
    environment:
      POSTGRES_USER: rfq_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: rfq_manager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfq_user -d rfq_manager_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfq_api
    environment:
      DATABASE_URL: postgresql+psycopg2://rfq_user:changeme@postgres:5432/rfq_manager_db
      APP_ENV: development
      APP_PORT: 8000
      APP_DEBUG: "false"
      AUTH_BYPASS_ENABLED: "true"
      AUTH_BYPASS_TEAM: Estimation
      AUTH_BYPASS_USER_NAME: Mohamed Guidara
      FILE_STORAGE_PATH: /app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >-
      sh -c "set -e;
      echo '[bootstrap] Applying database migrations...';
      alembic upgrade head;
      echo '[bootstrap] Starting API server...';
      exec uvicorn src.app:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
